name: 🔐 Gitleaks Secret Scan + DefectDojo Upload

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
      - ready_for_review
      - reopened

  workflow_dispatch:

jobs:
  secret-scan:
    name: 🔐 Gitleaks + DefectDojo Upload
    runs-on: ubuntu-latest

    # ✅ Skip the job if PR is closed and merged
    if: github.event.pull_request.state == 'open'

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Secret Scan & Upload
        uses: PoorneshORG/gitleaks-scan@pr-diff-action
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          dojo-url: ${{ secrets.DEFECTDOJO_URL }}
          dojo-api-key: ${{ secrets.DEFECTDOJO_API_KEY }}
          product-name: DevSecOps
          report-file: gitleaks-report.json
          repo-name: ${{ github.repository }}
          branch-name: ${{ github.head_ref || github.ref_name }}

      - name: 💬 Comment on PR with Secret Scan Result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
      🛑 **Secret Scan Alert** 🛑
            
      Secrets were detected in this pull request.
      
      - Please check the workflow logs for details.
      - Findings have been uploaded to DefectDojo for tracking.
      - For immediate remediation, follow the [Developers Secret Handling Guide](https://anywhereworks.atlassian.net/wiki/spaces/DevOps/pages/886767643/Implementing+Secret+Scanning+in+CI#Developer-Guide%3A-Secret-Scanning-Workflow-%26-Remediation).
      `
            })
