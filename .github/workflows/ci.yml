name: 🔐 Gitleaks Secret Scan + DefectDojo Upload

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
      - ready_for_review
      - reopened

  workflow_dispatch:

jobs:
  secret-scan:
    name: 🔐 Run Secret Scan + Upload
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # ✅ needed for PR comment

    if: ${{ github.event.pull_request.state == 'open' }}

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Login to GHCR before using your composite action
      - name: 🔐 Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ✅ Run your composite action
      - name: 🔍 Run Gitleaks Scan + Dojo Upload
        uses: PoorneshORG/gitleaks-scan@pr-diff-action
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          dojo-url: ${{ secrets.DEFECTDOJO_URL }}
          dojo-api-key: ${{ secrets.DEFECTDOJO_API_KEY }}
          product-name: DevSecOps
          report-file: gitleaks-report.json
          repo-name: ${{ github.repository }}
          branch-name: ${{ github.head_ref || github.ref_name }}
