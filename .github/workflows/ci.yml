name: SecurityPipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  secret-scan:
    name: Gitleaks-proxy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: PoorneshORG/Adaptavant/@gitleaks
        with:
          fetch-depth: 0 # Optional: pass any input if needed in reusable workflow
          