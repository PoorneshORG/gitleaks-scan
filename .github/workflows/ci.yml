name: abc123

on:
  push:
    branches: ["**"]   
  pull_request:
    types: [opened, closed, synchronize]  # Explicit PR events
    branches: ['**']

  workflow_dispatch:

jobs:
  secret-scan:
    name: 🔐 Gitleaks + DefectDojo Upload
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Secret Scan & Upload
        uses: PoorneshORG/gitleaks-scan@dojoaction
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          dojo-url: ${{ secrets.DEFECTDOJO_URL }}
          dojo-api-key: ${{ secrets.DEFECTDOJO_API_KEY }}
          product-name: DevSecOps
          report-file: gitleaks-report.json
          repo-name: ${{ github.repository }}
          branch-name: ${{ github.head_ref || github.ref_name }}
