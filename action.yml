name: SecretScan and Upload
description: Runs Gitleaks scan on PR diffs with custom rules and uploads results to DefectDojo

inputs:
  token:
    description: "GitHub token with read:packages access (needed for GHCR login)"
    required: true
  dojo-url:
    description: "DefectDojo instance URL"
    required: true
  dojo-api-key:
    description: "API key for DefectDojo"
    required: true
  product-name:
    description: "DefectDojo product name"
    required: true
  report-file:
    description: "Path to Gitleaks JSON output"
    required: false
    default: gitleaks-report.json
  repo-name:
    description: "Repository name"
    required: true
  branch-name:
    description: "Branch name (used as test title)"
    required: true
  filtered-report-file:
    description: "Path to Gitleaks filtered (new findings) JSON output"
    required: false
    default: gitleaks-new.json
    
runs:
  using: "composite"
  steps:
    - name: 🔐 Login to GitHub Container Registry
      run: echo "${{ inputs.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      shell: bash

    - name: 🕵️ Run Gitleaks scan (diff only)
      run: |
        docker run --rm \
          --entrypoint sh \
          -v "$GITHUB_WORKSPACE:/app" \
          -w /app \
          ghcr.io/poorneshorg/gitleaks:latest \
          -c "git config --global --add safe.directory /app && \
              gitleaks detect \
                --source=/app \
                --log-opts='origin/${{ github.base_ref }}..HEAD' \
                --report-format=json \
                --report-path=/app/${{ inputs.report-file }} \
                --exit-code 1 || true"
      shell: bash

    - name: 🔎 Filter new findings against baseline
      id: baseline
      shell: bash
      run: |
        BASELINE="${GITHUB_ACTION_PATH}/baseline.json"
        REPORT="${{ inputs.report-file }}"
        FILTERED="${{ inputs.filtered-report-file }}"

        if [ ! -f "$BASELINE" ]; then
          echo "⚠️ No baseline file found → treating all findings as new."
          cp "$REPORT" "$FILTERED"
        else
          baseline_content=$(cat "$BASELINE")

          jq --argjson baseline "$baseline_content" '
            [ .[] | select(.Fingerprint as $f | all($baseline[]; .Fingerprint != $f)) ]
          ' "$REPORT" > "$FILTERED"
        fi

        NEW_COUNT=$(jq length "$FILTERED")
        echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
        echo "new_findings=$(cat "$FILTERED" | jq -c .)" >> $GITHUB_OUTPUT

    - name: 📝 Unified summary
      run: |
        if [ "${{ steps.baseline.outputs.new_count }}" -eq 0 ]; then
          echo "✅ After comparing with baseline → No new secrets detected."
        else
          echo "🛑 After comparing with baseline → Found ${{ steps.baseline.outputs.new_count }} new secret(s):"
          echo '${{ steps.baseline.outputs.new_findings }}' | jq -r '
            .[] |
            "🔑 Fingerprint: \(.Fingerprint)\n" +
            "📄 File: \(.File)\n" +
            "📝 Rule: \(.RuleID)\n" +
            "ℹ️  Description: \(.Description // "No description")\n" +
            "  🧩 Match: \(.Match)\n---"
          '
        fi
      shell: bash

    # - name: 📝 Unified summary
    #   run: |
    #     if [ "${{ steps.baseline.outputs.new_count }}" -eq 0 ]; then
    #       echo "✅ After comparing with baseline → No new secrets detected."
    #     else
    #       echo "🛑 After comparing with baseline → Found ${{ steps.baseline.outputs.new_count }} new secret(s):"
    #       echo '${{ steps.baseline.outputs.new_findings }}' | jq -r '
    #         .[] |
    #         "\(.File):\(.StartLine) [\(.RuleID)] - \(.Description // "No description")\n" +
    #         "  🧩 Match: " + (if .Line then .Line else .Match end) + "\n"
    #       '
    #     fi
    #   shell: bash

    - name: 📤 Upload full Gitleaks report to DefectDojo
      run: |
        chmod +x "${{ github.action_path }}/upload_to_defectdojo.sh"

        REPO_NAME=$(basename "${{ inputs.repo-name }}")
        TEST_TITLE="${{ inputs.branch-name }}"

        "${{ github.action_path }}/upload_to_defectdojo.sh" \
          "${{ inputs.dojo-url }}" \
          "${{ inputs.dojo-api-key }}" \
          "${{ inputs.product-name }}" \
          "${{ inputs.filtered-report-file }}" \
          "$REPO_NAME" \
          "$TEST_TITLE"
      shell: bash
## "${{ inputs.report-file }}" \
    - name: 💬 Comment on PR if new secrets detected
      if: steps.baseline.outputs.new_count != '0' && always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          if (context.payload.pull_request) {
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🛑 **Secret Scan Alert**\n\nOur automated security scan has detected *new* potential secrets in this pull request.\n\n🔒 For your security and the security of the organization:\n- Please **do not share or expose secrets in source code**.\n- Review the scan findings in the workflow logs.\n- Rotate or revoke the exposed secret if necessary.\n\n👉 Follow the remediation steps outlined in the [Developer Guide for Secret Remediation](https://anywhereworks.atlassian.net/wiki/spaces/DevOps/pages/886767643/Implementing+Secret+Scanning+in+CI#Developer-Guide%3A-Secret-Scanning-Workflow-%26-Remediation)."
            });
          }

    - name: ✅ Decide pipeline status
      if: always()
      run: |
        if [ "${{ steps.baseline.outputs.new_count }}" -ne 0 ]; then
          echo "🛑 New secrets introduced → failing pipeline after upload and PR comment."
          exit 1
        else
          echo "✅ No new secrets detected → pipeline passes."
        fi
      shell: bash
