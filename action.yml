# Original and correct one

name: SecretScan and Upload
description: Runs Gitleaks scan on PR diffs with custom rules and uploads results to DefectDojo

inputs:
  token:
    description: "GitHub token with read:packages access"
    required: true
  dojo-url:
    description: "DefectDojo instance URL"
    required: true
  dojo-api-key:
    description: "API key for DefectDojo"
    required: true
  product-name:
    description: "DefectDojo product name"
    required: true
  report-file:
    description: "Path to Gitleaks JSON output"
    required: false
    default: gitleaks-report.json
  repo-name:
    description: "Repository name"
    required: true
  branch-name:
    description: "Branch name (used as test title)"
    required: true

runs:
  using: "composite"
  steps:
    - name: 🔐 Login to GitHub Container Registry
      run: echo "${{ inputs.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      shell: bash

    - name: 🕵️ Run Gitleaks scan (diff only)
      run: |
        docker run --rm \
          --entrypoint sh \
          -v "$GITHUB_WORKSPACE:/app" \
          -w /app \
          ghcr.io/poorneshorg/gitleaks:latest \
          -c "git config --global --add safe.directory /app && \
              gitleaks detect \
                --source=/app \
                --log-opts='origin/${{ github.base_ref }}..HEAD' \
                --report-format=json \
                --report-path=${{ inputs.report-file }} \
                --exit-code 1 || true"
      shell: bash

    - name: 📝 Print Gitleaks summary (outside container)
      run: |
        if jq -e 'length > 0' "${{ inputs.report-file }}" > /dev/null 2>&1; then
          echo "🛑 Secrets detected:"
          jq -r '.[] | "\(.File):\(.StartLine) [\(.RuleID)] - \(.Description // "No description")\n  🧩 Match: \(.Match)\n"' "${{ inputs.report-file }}"
        else
          echo "✅ No secrets found."
        fi
      shell: bash


    - name: 📤 Upload Gitleaks report to DefectDojo
      run: |
        chmod +x "${{ github.action_path }}/upload_to_defectdojo.sh"
    
        REPO_NAME=$(basename "${{ inputs.repo-name }}")
        TEST_TITLE="${{ inputs.branch-name }}"

        # # Check if scan has any findings
        # if jq -e '.[]?' "${{ inputs.report-file }}" > /dev/null; then
        #   echo "🔍 Findings present → will create/update in DefectDojo."
        # else
        #   echo "ℹ️ No findings in report → script will decide whether to skip or update existing engagement/test."
        # fi
    
        "${{ github.action_path }}/upload_to_defectdojo.sh" \
          "${{ inputs.dojo-url }}" \
          "${{ inputs.dojo-api-key }}" \
          "${{ inputs.product-name }}" \
          "${{ inputs.report-file }}" \
          "$REPO_NAME" \
          "$TEST_TITLE"
      shell: bash

      # 🚨 Explicitly fail if secrets were found
    - name: Fail if secrets detected
      if: always() # run even if previous failed
      run: |
        if jq -e 'length > 0' "${{ inputs.report-file }}" > /dev/null 2>&1; then
          echo "🛑 Secrets detected → failing pipeline after upload to DefectDojo."
          exit 1
        else
          echo "✅ No secrets detected → pipeline passes."
        fi
