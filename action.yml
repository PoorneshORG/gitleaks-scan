name: SecretScan
description: Runs Gitleaks with custom rules

runs:
  using: "composite"
  steps:
    - name: Run Gitleaks with custom rules using prebuilt image
      run: |
        echo "${{ inputs.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/app" \
          -w /app \
          ghcr.io/poorneshorg/gitleaks:latest \
          detect \
            --source=/app \
            --no-git \
            --verbose \
            --exit-code 1 || true
      shell: bash
inputs:
  token:
    required: true
    description: "GitHub token with read:packages access"
