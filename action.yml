name: SecretScan and Upload
description: Runs Gitleaks scan with custom rules and uploads results to DefectDojo

inputs:
  token:
    required: true
    description: "GitHub token with read:packages access"

  dojo-url:
    description: "DefectDojo instance URL"
    required: true
  dojo-api-key:
    description: "API key for DefectDojo"
    required: true
  product-name:
    description: "DefectDojo product name"
    required: true
  report-file:
    description: "Path to Gitleaks JSON output"
    required: false
    default: gitleaks-report.json
  repo-name:
    description: "Repository name"
    required: true
  branch-name:
    description: "Branch name (used in test title)"
    required: true

runs:
  using: "composite"
  steps:
    - name: 🛂 Authenticate to GHCR
      run: echo "${{ inputs.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      shell: bash

    - name: 🕵️ Run Gitleaks with custom rules using prebuilt image
      run: |
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/app" \
          -w /app \
          ghcr.io/poorneshorg/gitleaks:latest \
          detect \
            --source=/app \
            --no-git \
            --verbose \
            --report-format=json \
            --report-path=${{ inputs.report-file }} \
            --exit-code 1 || true
      shell: bash

    - name: 📤 Upload Gitleaks report to DefectDojo
      run: |
        echo "📌 Uploading report:"
        echo "  repo-name = '${{ inputs.repo-name }}'"
        echo "  branch-name = '${{ inputs.branch-name }}'"
        echo "  test-title = '${{ inputs.branch-name }} - $(date +%F)'"

        chmod +x "${{ github.action_path }}/upload_to_defectdojo.sh"

        "${{ github.action_path }}/upload_to_defectdojo.sh" \
          "${{ inputs.dojo-url }}" \
          "${{ inputs.dojo-api-key }}" \
          "${{ inputs.product-name }}" \
          "${{ inputs.report-file }}" \
          "${{ inputs.repo-name }}" \
          "${{ inputs.branch-name }} - $(date +%F)"
      shell: bash
